<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Zone — TechYuva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .sz-page {
      padding: clamp(5rem, 10vh, 8rem) var(--pad) clamp(2rem, 4vh, 4rem);
      padding-left: calc(var(--nav-edge) + var(--pad));
    }
    /* All sections — big, same level */
    .sz-sec { margin-bottom: 3rem; }
    .sz-sec__head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 1.2rem;
      font-family: 'Instrument Serif', Georgia, serif; font-weight: 400;
      font-size: clamp(2.4rem, 5.5vw, 3.6rem); letter-spacing: -.02em; line-height: 1.05;
    }
    #career .sz-sec__head { font-style: italic; }
    .sz-sec__count {
      font-family: var(--font-mono); font-size: .68rem; color: var(--ink-soft);
      font-weight: 400; white-space: nowrap; margin-left: .6rem; font-style: normal;
    }
    .sz-card:hover { border-color: var(--accent); }
    .sz-card__top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: .4rem; margin-bottom: .2rem;
    }
    .sz-card__title {
      font-family: var(--font-display); font-weight: 400;
      font-size: 1rem; line-height: 1.25;
    }
    .sz-card__arrow { color: var(--accent); flex-shrink: 0; margin-top: 1px; transition: .2s; }
    .sz-card:hover .sz-card__arrow { transform: translateX(3px); }
    .sz-card__desc {
      font-size: .76rem; color: var(--ink-soft); line-height: 1.45;
      margin-bottom: .4rem; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .sz-card__tags { display: flex; flex-wrap: wrap; gap: .3rem; }
    .sz-card__tag {
      font-family: var(--font-mono); font-size: .58rem; text-transform: uppercase;
      letter-spacing: .05em; padding: .15em .5em; border-radius: 100px;
      background: var(--paper-2); color: var(--ink-soft); border: 1px solid var(--line);
    }
    .sz-card__tag--a { background: var(--accent-soft); color: var(--accent); border-color: rgba(184,92,56,.2); }
    .sz-empty { grid-column: 1/-1; color: var(--ink-faint); font-size: .78rem; }

    @media (max-width: 900px) { .sz-page { padding-left: var(--pad); } }
    @media (max-width: 640px) {
      .sz-sec__head { font-size: 1.8rem; }
      .sz-grid { grid-template-columns: 1fr; gap: .4rem; }
      .sz-card { padding: .75rem .9rem; }
    }
  </style>
</head>
<body data-theme="paper">

  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"><span></span></div>

  <header class="nav" id="nav">
    <button class="nav__expand" id="navExpand" aria-label="Show explorer">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div class="nav__explorer" id="navExplorer">
      <div class="nav__explorer-head">
        <span class="nav__explorer-title">EXPLORER</span>
        <button class="nav__explorer-toggle" id="explorerToggle" aria-label="Toggle explorer">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="nav__tree" id="navTree">
        <div class="nav__tree-item nav__tree-item--root">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M14 4H8L6 2H2v12h12V4z" stroke="currentColor" stroke-width="1.2"/></svg><span>techyuva</span>
        </div>
        <div class="nav__tree-children">
          <a href="index.html" class="nav__tree-item">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 2h7l3 3v9H3V2z" stroke="currentColor" stroke-width="1.2"/><path d="M10 2v3h3" stroke="currentColor" stroke-width="1.2"/></svg>
            <span>Main</span>
          </a>
          <a href="menu.html" class="nav__tree-item">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M14 4H8L6 2H2v12h12V4z" stroke="currentColor" stroke-width="1.2"/></svg>
            <span>Courses</span>
          </a>
          <a href="studyzone.html" class="nav__tree-item is-active">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M14 4H8L6 2H2v12h12V4z" stroke="currentColor" stroke-width="1.2"/></svg>
            <span>Study Zone</span>
          </a>
          <a href="owner.html" class="nav__tree-item">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 2h7l3 3v9H3V2z" stroke="currentColor" stroke-width="1.2"/><path d="M10 2v3h3" stroke="currentColor" stroke-width="1.2"/></svg>
            <span>Owner</span>
          </a>
        </div>
      </div>
    </div>
    <div class="nav__bar">
      <a href="index.html#top" class="nav__logo"><span class="nav__logo-mark">>_</span>TechYuva</a>
      <div class="nav__actions"><a href="index.html" class="link-arrow" style="font-size:.78rem;">← Back home</a></div>
    </div>
  </header>

  <main class="sz-page">
    <div class="sz-sec reveal" id="career">
      <div class="sz-sec__head">Career Roadmap <span class="sz-sec__count" id="careerCount">0</span></div>
      <div class="sz-grid" id="careerGrid"></div>
    </div>
    <div class="sz-sec reveal" id="placement">
      <div class="sz-sec__head">Placement <span class="sz-sec__count" id="placementCount">0</span></div>
      <div class="sz-grid" id="placementGrid"></div>
    </div>
    <div class="sz-sec reveal" id="jobs">
      <div class="sz-sec__head">Jobs <span class="sz-sec__count" id="jobsCount">0</span></div>
      <div class="sz-grid" id="jobsGrid"></div>
    </div>
    <div class="sz-sec reveal" id="materials">
      <div class="sz-sec__head">Materials <span class="sz-sec__count" id="materialsCount">0</span></div>
      <div class="sz-grid" id="materialsGrid"></div>
    </div>
    <div class="sz-sec reveal" id="mocktest">
      <div class="sz-sec__head">Mock Tests <span class="sz-sec__count" id="mocktestCount">0</span></div>
      <div class="sz-grid" id="mocktestGrid"></div>
    </div>
  </main>

  <footer class="footer">
    <span class="footer__logo">>_TechYuva</span>
    <p>Online coding institute. Built for learners, by engineers.</p>
    <span class="footer__year">&copy; 2026 TechYuva</span>
  </footer>

  <script>
    const API_BASE = (!window.location.hostname || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3001/api' : window.location.origin + '/api';
    async function api(p, o = {}) {
      const c = { headers: { 'Content-Type': 'application/json' }, ...o };
      const r = await fetch(API_BASE + p, c);
      if (!r.ok) { const e = await r.json().catch(() => ({ error: r.statusText })); throw new Error(e.error || 'API error'); }
      return r.json();
    }
    async function getItems(t) { return api('/studyzone' + (t ? '?type=' + encodeURIComponent(t) : '')); }

    const $ = (s, c = document) => c.querySelector(s);
    const $$ = (s, c = document) => [...c.querySelectorAll(s)];

    $("#explorerToggle")?.addEventListener("click", () => $("#nav").classList.add("is-collapsed"));
    $("#navExpand")?.addEventListener("click", () => $("#nav").classList.remove("is-collapsed"));

    const sb = $("#scrollProgress")?.querySelector("span");
    if (sb) { const u = () => { const m = document.documentElement.scrollHeight - innerHeight; sb.style.width = m > 0 ? (scrollY / m) * 100 + "%" : "0%"; }; addEventListener("scroll", u, { passive: true }); addEventListener("resize", u); u(); }

    const ro = new IntersectionObserver(es => { es.forEach(e => { if (!e.isIntersecting) return; e.target.classList.add("is-visible"); ro.unobserve(e.target); }); }, { threshold: 0.1 });
    $$(".reveal").forEach(el => ro.observe(el));

    const CFG = {
      'career-roadmap': { count: '#careerCount', grid: '#careerGrid' },
      'placement-guideline': { count: '#placementCount', grid: '#placementGrid' },
      'job-opening': { count: '#jobsCount', grid: '#jobsGrid' },
      'study-material': { count: '#materialsCount', grid: '#materialsGrid' },
      'mock-test': { count: '#mocktestCount', grid: '#mocktestGrid' },
    };

    function tags(arr, a) { return Array.isArray(arr) && arr.length ? arr.map(t => `<span class="sz-card__tag${a ? ' sz-card__tag--a' : ''}">${t}</span>`).join('') : ''; }

    function render(type, items) {
      const c = CFG[type]; if (!c) return;
      $(c.count).textContent = items.length;
      const g = $(c.grid);
      if (!items.length) { g.innerHTML = '<span class="sz-empty">Nothing yet</span>'; return; }
      g.innerHTML = items.map((it, i) => {
        const m = it.meta || {}; let t = [];
        if (type === 'career-roadmap') t = (m.skills || []).slice(0, 4);
        else if (type === 'job-opening') { if (m.company) t.push(m.company); if (m.location) t.push(m.location); if (Array.isArray(m.tags)) t.push(...m.tags); }
        else if (type === 'study-material') { if (m.fileType) t.push(m.fileType); if (m.size) t.push(m.size); }
        else if (type === 'mock-test') { if (m.difficulty) t.push(m.difficulty); if (m.topic) t.push(m.topic); if (m.platform) t.push(m.platform); }
        const lk = it.link || '#', ex = /^https?:\/\//i.test(lk) ? ' target="_blank" rel="noopener"' : '';
        const num = type === 'mock-test' ? `<span class="sz-card__tag sz-card__tag--a">#${i + 1}</span>` : '';
        return `<a class="sz-card" href="${lk}"${ex}>
          <div class="sz-card__top"><h3 class="sz-card__title">${it.title}</h3>
            <svg class="sz-card__arrow" width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 12h14m0 0-6-6m6 6-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <p class="sz-card__desc">${it.description || ''}</p>
          <div class="sz-card__tags">${num}${tags(t.slice(0, 4), type === 'mock-test' || type === 'career-roadmap')}</div>
        </a>`;
      }).join('');
    }

    (async () => {
      try {
        const ks = Object.keys(CFG);
        const rs = await Promise.all(ks.map(k => getItems(k).catch(() => [])));
        ks.forEach((k, i) => render(k, rs[i]));
      } catch (e) { console.warn('Study zone:', e.message); }
    })();
  </script>
</body>
</html>
